name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Snake SVG
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake (light & dark mode)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#bf00ff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&color_empty=#ebedf0&color_bg=#ffffff
            dist/github-contribution-grid-snake-dark.svg?color_snake=#bf00ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&color_empty=#161b22&color_bg=#0d1117

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}